<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Monitoring Station | Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
        }

        .font-tech {
            font-family: 'Orbitron', sans-serif;
        }

        .glow-green {
            text-shadow: 0 0 10px #10b981;
        }

        .border-neon {
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <header
        class="max-w-6xl mx-auto mb-12 flex flex-col md:flex-row justify-between items-center border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-3xl font-tech font-bold text-emerald-500 glow-green uppercase tracking-widest">Command
                Center</h1>
            <p class="text-gray-400 text-sm mt-1">Live Global Launch Monitoring Station • Alpha-01</p>
        </div>
        <div class="mt-6 md:mt-0 text-right">
            <div id="station-clock" class="text-xl font-tech text-gray-300">00:00:00 UTC</div>
            <div class="text-xs text-emerald-400 font-bold uppercase tracking-tighter">Status: Active</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <section id="next-launch" class="bg-zinc-900 border-neon p-8 rounded-lg mb-12 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-emerald-400 font-bold uppercase text-xs mb-2 tracking-widest">T-Minus to Ignition</h2>
                <div id="countdown" class="text-5xl md:text-7xl font-tech font-bold mb-6 tracking-tighter">--:--:--:--
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6 border-t border-zinc-800">
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Mission</p>
                        <p id="main-mission" class="text-xl font-semibold">Loading...</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Vehicle</p>
                        <p id="main-rocket" class="text-xl font-semibold">--</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Location</p>
                        <p id="main-site" class="text-xl font-semibold">--</p>
                    </div>
                </div>
            </div>
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path
                        d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
                    <path
                        d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" />
                    <path d="M9 12H4s.55-3.03 2-4.5c1.62-1.63 5-2.5 5-2.5" />
                    <path d="M12 15v5s3.03-.55 4.5-2c1.63-1.62 2.5-5 2.5-5" />
                </svg>
            </div>
        </section>

        <h3 class="text-xl font-tech mb-6 flex items-center">
            <span class="w-2 h-2 bg-emerald-500 rounded-full mr-3 animate-pulse"></span>
            Upcoming Schedule
        </h3>
        <div id="launch-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="bg-zinc-900/50 border border-zinc-800 p-5 rounded animate-pulse">
                <div class="h-4 bg-zinc-700 w-1/3 mb-4 rounded"></div>
                <div class="h-5 bg-zinc-600 w-3/4 mb-3 rounded"></div>
                <div class="h-3 bg-zinc-800 w-1/2 rounded"></div>
            </div>
            <div class="bg-zinc-900/50 border border-zinc-800 p-5 rounded animate-pulse hidden md:block">
                <div class="h-4 bg-zinc-700 w-1/3 mb-4 rounded"></div>
                <div class="h-5 bg-zinc-600 w-3/4 mb-3 rounded"></div>
                <div class="h-3 bg-zinc-800 w-1/2 rounded"></div>
            </div>
            <div class="bg-zinc-900/50 border border-zinc-800 p-5 rounded animate-pulse hidden lg:block">
                <div class="h-4 bg-zinc-700 w-1/3 mb-4 rounded"></div>
                <div class="h-5 bg-zinc-600 w-3/4 mb-3 rounded"></div>
                <div class="h-3 bg-zinc-800 w-1/2 rounded"></div>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-20 text-gray-600 text-xs border-t border-zinc-900 pt-6 pb-12">
        Data provided by The Space Devs (LL2 API). Station deployed via Antigravity Agency.
    </footer>

    <script>
        const API_URL = 'https://lldev.thespacedevs.com/2.2.0/launch/upcoming/?limit=15';
        let launches = [];
        let countdownInterval;

        // Initialize station clock immediately
        function updateClock() {
            document.getElementById('station-clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchLaunches() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error('API Rate Limit Exceeded (429). Please try again later.');
                    }
                    throw new Error('Network error: ' + response.status);
                }
                const data = await response.json();
                
                // Filter out launches that have already happened
                const nowTime = new Date().getTime();
                launches = (data.results || []).filter(l => new Date(l.net).getTime() > nowTime);

                if (launches.length === 0) {
                    throw new Error('No future launches found in telemetry data.');
                }
                updateUI();
            } catch (error) {
                console.error('Telemetry Interrupted:', error);
                document.getElementById('main-mission').innerText = "Telemetry Offline";
                document.getElementById('main-rocket').innerText = "System Fault";
                document.getElementById('main-site').innerText = "Standby";

                const countdownEl = document.getElementById('countdown');
                countdownEl.innerText = "OFFLINE";
                countdownEl.classList.add('text-red-500');

                document.getElementById('launch-grid').innerHTML = `
                    <div class="col-span-full bg-red-900/20 border border-red-500/30 p-6 rounded text-red-400">
                        <p class="font-bold">Error retrieving launch sequence.</p>
                        <p class="text-sm mt-1 opacity-80">${error.message}</p>
                    </div>
                `;
            }
        }

        function updateUI() {
            const next = launches[0];
            document.getElementById('main-mission').innerText = next.name || 'Unknown Mission';

            const rocketName = (next.rocket && next.rocket.configuration) ? next.rocket.configuration.full_name : 'Classified';
            document.getElementById('main-rocket').innerText = rocketName;

            const siteName = (next.pad && next.pad.location) ? next.pad.location.name : 'Unknown Site';
            document.getElementById('main-site').innerText = siteName;

            const grid = document.getElementById('launch-grid');
            if (launches.length > 1) {
                grid.innerHTML = launches.slice(1).map(l => {
                    const rName = (l.rocket && l.rocket.configuration) ? l.rocket.configuration.name : 'Classified';
                    const sName = (l.pad && l.pad.location) ? l.pad.location.name : 'Unknown';
                    return `
                        <div class="bg-zinc-900/50 border border-zinc-800 p-5 rounded hover:border-emerald-500/50 transition-colors">
                            <p class="text-emerald-500 text-xs font-bold mb-2">${new Date(l.net).toLocaleString()}</p>
                            <h4 class="font-bold text-sm mb-1 line-clamp-1" title="${l.name}">${l.name}</h4>
                            <p class="text-gray-400 text-xs truncate" title="${rName} • ${sName}">${rName} • ${sName}</p>
                        </div>
                    `;
                }).join('');
            } else {
                grid.innerHTML = '<p class="text-gray-500 text-sm col-span-full">No additional launches scheduled at this time.</p>';
            }

            startCountdown(next.net);
        }

        function startCountdown(netTime) {
            if (countdownInterval) clearInterval(countdownInterval);
            const target = new Date(netTime).getTime();

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;

                if (diff < 0) {
                    document.getElementById('countdown').innerText = "LIFTOFF";
                    clearInterval(countdownInterval);
                    return;
                }

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown').innerText =
                    `T- ${d.toString().padStart(2, '0')}:${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        fetchLaunches();
    </script>
</body>

</html>
